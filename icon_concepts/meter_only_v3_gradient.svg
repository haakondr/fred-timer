<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF6E3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EEE8D5;stop-opacity:1" />
    </linearGradient>

    <!-- Meter glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgGradient)" rx="180"/>

  <!-- Single centered meter bar with glow -->
  <g transform="translate(512, 512)" filter="url(#glow)">
    <!-- Meter background -->
    <rect x="-220" y="-480" width="440" height="960" fill="#073642" rx="50" stroke="#586E75" stroke-width="4"/>

    <!-- Filled blocks from bottom up -->
    <!-- Green zone (bottom 60%) -->
    <rect x="-195" y="405" width="390" height="60" fill="#859900" rx="8"/>
    <rect x="-195" y="330" width="390" height="60" fill="#859900" rx="8"/>
    <rect x="-195" y="255" width="390" height="60" fill="#859900" rx="8"/>
    <rect x="-195" y="180" width="390" height="60" fill="#859900" rx="8"/>
    <rect x="-195" y="105" width="390" height="60" fill="#859900" rx="8"/>
    <rect x="-195" y="30" width="390" height="60" fill="#859900" rx="8"/>
    <rect x="-195" y="-45" width="390" height="60" fill="#859900" rx="8"/>
    <rect x="-195" y="-120" width="390" height="60" fill="#859900" rx="8"/>
    <rect x="-195" y="-195" width="390" height="60" fill="#859900" rx="8"/>

    <!-- Orange zone (warning 20%) -->
    <rect x="-195" y="-270" width="390" height="60" fill="#CB4B16" rx="8"/>
    <rect x="-195" y="-345" width="390" height="60" fill="#CB4B16" rx="8"/>

    <!-- Red zone (danger 10%) -->
    <rect x="-195" y="-420" width="390" height="60" fill="#DC322F" rx="8"/>

    <!-- Empty (top) -->
    <rect x="-195" y="-470" width="390" height="40" fill="#002B36" rx="8" opacity="0.6"/>
  </g>
</svg>
